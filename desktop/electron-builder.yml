appId: com.ctrl2phone.desktop
productName: Ctrl2Phone
copyright: Copyright © 2026 Eren
directories:
  output: dist
  buildResources: build
files:
  - src/**/*.js
  - src/**/*.html
  - src/**/*.css
  - index.html
  - package.json
extraResources:
  - from: src/key_listener.exe
    to: src/key_listener.exe
  - from: src/photo_dropper.exe
    to: src/photo_dropper.exe
  - from: src/ocr_helper.exe
    to: src/ocr_helper.exe
# win:
#   target:
#     - nsis
#     - portable
#   icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  releaseType: release

